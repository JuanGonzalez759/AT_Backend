<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  </head>
  <body class="bg-black text-white min-h-screen">

    <a href="#" class="absolute top-6 left-6 text-purple-400 font-semibold">AniToki</a>

    <div class="min-h-screen flex items-center justify-center">
      <div class="w-full max-w-sm px-6">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-extralight">Acceder</h1>
        </div>

        <form method="post" class="card p-8 space-y-6" autocomplete="off" novalidate>
          {% csrf_token %}
          <div>
            <label class="block text-sm mb-2 text-gray-300">Dirección de email</label>
            <div class="input-wrap relative">
              <input name="username" type="text" required autofocus readonly
                class="input-field" placeholder="" value="" autocomplete="off" autocorrect="off" autocapitalize="off" inputmode="email">
              <span class="underline"></span>
            </div>
          </div>

          <div>
            <label class="block text-sm mb-2 text-gray-300">Contraseña</label>
            <div class="relative input-wrap">
              <input name="password" id="password" type="password" required readonly class="input-field" placeholder="" autocomplete="off">
              <button type="button" id="toggle" class="toggle-btn">mostrar</button>
              <span class="underline"></span>
            </div>
          </div>

          <div>
            <button type="submit" class="submit-btn">ACCEDER</button>
          </div>

          <div class="flex justify-between text-xs text-purple-400">
            <a href="{% url 'password_reset' %}">¿Has olvidado tu contraseña?</a>
            <a href="{% url 'register' %}">CREAR CUENTA</a>
          </div>
        </form>
      </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
  </body>
</html>
