<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  </head>
  <body class="bg-black text-white min-h-screen">

    <a href="#" class="absolute top-6 left-6 text-purple-400 font-semibold">AniToki</a>

    <div class="min-h-screen flex items-center justify-center">
      <div class="w-full max-w-sm px-6">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-extralight">Recuperar contraseña</h1>
          <p class="text-xs text-gray-400 mt-2">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>

        <form method="post" class="card p-8 space-y-6" autocomplete="off" novalidate>
          {% csrf_token %}
          
          <div>
            <label class="block text-sm mb-2 text-gray-300">Dirección de email</label>
            <div class="input-wrap relative">
              <input id="email-input" name="email" type="text" required readonly
                class="input-field" placeholder="" value="" autocomplete="off" autocorrect="off" autocapitalize="off" inputmode="email">
              <span class="underline"></span>
            </div>
            <span id="email-error" class="text-red-400 text-xs mt-1 hidden"></span>
            {% if form.email.errors %}
              <span class="text-red-400 text-xs mt-1">{{ form.email.errors.0 }}</span>
            {% endif %}
          </div>

          <div>
            <button type="submit" class="submit-btn" id="submit-btn" disabled>ENVIAR</button>
          </div>

          <div class="text-center text-xs text-purple-400">
            <a href="{% url 'login' %}">Volver al login</a>
          </div>
        </form>
      </div>
    </div>

    <script src="{% static 'js/password_reset.js' %}"></script>
  </body>
</html>
